<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SureProfile - Portfolio</title>
    <meta name="description" content="Full Stack Developer Portfolio">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Custom Styles -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .min-h-screen {
            min-height: 100vh;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <!-- React Root -->
    <div id="react-root"></div>

    <!-- React App Script -->
    <script type="text/babel">
        const { useState } = React;

        // Navbar Component
        function Navbar({ currentPage, setCurrentPage }) {
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            const navItems = [
                { id: 'home', label: 'Home' },
                { id: 'about', label: 'About' },
                { id: 'projects', label: 'Projects' },
                { id: 'contact', label: 'Contact' },
            ];

            return (
                <nav className="bg-white shadow-md fixed w-full z-50">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between h-16">
                            <div className="flex items-center">
                                <button
                                    onClick={() => setCurrentPage('home')}
                                    className="text-2xl font-bold text-blue-600 hover:text-blue-700 transition-colors"
                                >
                                    SureProfile
                                </button>
                            </div>
                            
                            <div className="hidden md:flex items-center space-x-4">
                                {navItems.map((item) => (
                                    <button
                                        key={item.id}
                                        onClick={() => setCurrentPage(item.id)}
                                        className={`px-3 py-2 rounded-md text-sm font-medium transition-colors ${
                                            currentPage === item.id
                                                ? 'text-blue-600 bg-blue-50'
                                                : 'text-gray-700 hover:text-blue-600 hover:bg-gray-50'
                                        }`}
                                    >
                                        {item.label}
                                    </button>
                                ))}
                            </div>

                            <div className="flex items-center md:hidden">
                                <button
                                    onClick={() => setIsMenuOpen(!isMenuOpen)}
                                    className="text-gray-700 hover:text-blue-600 focus:outline-none"
                                >
                                    <svg className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        {isMenuOpen ? (
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                        ) : (
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
                                        )}
                                    </svg>
                                </button>
                            </div>
                        </div>

                        {isMenuOpen && (
                            <div className="md:hidden">
                                <div className="px-2 pt-2 pb-3 space-y-1 sm:px-3">
                                    {navItems.map((item) => (
                                        <button
                                            key={item.id}
                                            onClick={() => {
                                                setCurrentPage(item.id);
                                                setIsMenuOpen(false);
                                            }}
                                            className={`block w-full text-left px-3 py-2 rounded-md text-base font-medium transition-colors ${
                                                currentPage === item.id
                                                    ? 'text-blue-600 bg-blue-50'
                                                    : 'text-gray-700 hover:text-blue-600 hover:bg-gray-50'
                                            }`}
                                        >
                                            {item.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </nav>
            );
        }

        // Home Component
        function Home() {
            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 pt-16">
                    <section className="py-20 px-4">
                        <div className="max-w-7xl mx-auto">
                            <div className="text-center">
                                <h1 className="text-5xl md:text-6xl font-bold text-gray-900 mb-6">
                                    Hi, I'm <span className="text-blue-600">Your Name</span>
                                </h1>
                                <p className="text-xl md:text-2xl text-gray-600 mb-8 max-w-2xl mx-auto">
                                    A passionate Full Stack Developer specializing in building exceptional digital experiences
                                </p>
                                <div className="flex justify-center gap-4 flex-wrap">
                                    <button className="px-8 py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-colors shadow-lg">
                                        View My Work
                                    </button>
                                    <button className="px-8 py-3 bg-white text-blue-600 font-semibold rounded-lg hover:bg-gray-50 transition-colors shadow-lg border border-blue-200">
                                        Contact Me
                                    </button>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section className="py-16 px-4 bg-white">
                        <div className="max-w-7xl mx-auto">
                            <h2 className="text-3xl font-bold text-center text-gray-900 mb-12">Tech Stack</h2>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-8">
                                {['JavaScript', 'React', 'Laravel', 'Node.js', 'Python', 'TypeScript', 'PostgreSQL', 'Docker'].map((skill) => (
                                    <div key={skill} className="text-center p-6 bg-gray-50 rounded-xl hover:shadow-lg transition-shadow">
                                        <span className="text-lg font-semibold text-gray-700">{skill}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <section className="py-16 px-4">
                        <div className="max-w-4xl mx-auto text-center">
                            <h2 className="text-3xl font-bold text-gray-900 mb-4">Ready to Start a Project?</h2>
                            <p className="text-gray-600 mb-8">Let's collaborate and bring your ideas to life.</p>
                            <button className="px-8 py-3 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 transition-colors shadow-lg">
                                Get In Touch
                            </button>
                        </div>
                    </section>
                </div>
            );
        }

        // About Component
        function About() {
            const skills = [
                { name: 'Frontend', items: ['React', 'JavaScript', 'TypeScript', 'HTML/CSS', 'Tailwind'] },
                { name: 'Backend', items: ['Laravel', 'Node.js', 'Python', 'PHP', 'REST APIs'] },
                { name: 'Database', items: ['PostgreSQL', 'MySQL', 'MongoDB', 'Redis'] },
                { name: 'Tools', items: ['Git', 'Docker', 'AWS', 'CI/CD', 'Linux'] },
            ];

            return (
                <div className="min-h-screen bg-gray-50 py-16 px-4 pt-20">
                    <div className="max-w-7xl mx-auto">
                        <h1 className="text-4xl font-bold text-center text-gray-900 mb-12">About Me</h1>
                        
                        <div className="grid md:grid-cols-2 gap-12 items-start">
                            <div className="bg-white p-8 rounded-xl shadow-md">
                                <h2 className="text-2xl font-semibold text-gray-900 mb-4">Who I Am</h2>
                                <p className="text-gray-600 mb-4">
                                    I'm a passionate Full Stack Developer with expertise in building modern web applications.
                                    With several years of experience in both frontend and backend development, I specialize
                                    in creating scalable, user-friendly solutions.
                                </p>
                                <p className="text-gray-600 mb-4">
                                    My journey started with curiosity about how websites work, and it has evolved into a
                                    career where I get to build products that make a difference.
                                </p>
                                <p className="text-gray-600">
                                    When I'm not coding, you can find me exploring new technologies, contributing to open
                                    source projects, or sharing knowledge with the developer community.
                                </p>
                            </div>

                            <div className="space-y-6">
                                <h2 className="text-2xl font-semibold text-gray-900">My Skills</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    {skills.map((category) => (
                                        <div key={category.name} className="bg-white p-6 rounded-xl shadow-md">
                                            <h3 className="text-lg font-semibold text-blue-600 mb-3">{category.name}</h3>
                                            <ul className="space-y-2">
                                                {category.items.map((item) => (
                                                    <li key={item} className="text-gray-600 flex items-center">
                                                        <span className="w-2 h-2 bg-blue-400 rounded-full mr-2"></span>
                                                        {item}
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Projects Component
        function Projects() {
            const projects = [
                { title: 'E-Commerce Platform', description: 'Full-featured online store with cart and payments.', tech: ['React', 'Laravel', 'PostgreSQL'] },
                { title: 'Task Management App', description: 'Collaborative tool with real-time updates.', tech: ['Vue.js', 'Node.js', 'MongoDB'] },
                { title: 'Portfolio Website', description: 'Personal portfolio with blog and admin panel.', tech: ['React', 'Tailwind', 'Laravel'] },
                { title: 'API Gateway', description: 'RESTful API with auth and rate limiting.', tech: ['Node.js', 'Express', 'Redis'] },
                { title: 'Chat Application', description: 'Real-time messaging with file sharing.', tech: ['React', 'Firebase', 'WebSocket'] },
                { title: 'Analytics Dashboard', description: 'Data visualization with charts and reports.', tech: ['React', 'D3.js', 'Python'] },
            ];

            return (
                <div className="min-h-screen bg-gray-50 py-16 px-4 pt-20">
                    <div className="max-w-7xl mx-auto">
                        <h1 className="text-4xl font-bold text-center text-gray-900 mb-4">My Projects</h1>
                        <p className="text-center text-gray-600 mb-12 max-w-2xl mx-auto">
                            Here are some of the projects I've worked on.
                        </p>

                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {projects.map((project, index) => (
                                <div key={index} className="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-shadow">
                                    <div className="h-48 bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center">
                                        <svg className="w-16 h-16 text-white opacity-75" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                        </svg>
                                    </div>
                                    <div className="p-6">
                                        <h3 className="text-xl font-semibold text-gray-900 mb-2">{project.title}</h3>
                                        <p className="text-gray-600 mb-4">{project.description}</p>
                                        <div className="flex flex-wrap gap-2">
                                            {project.tech.map((tech) => (
                                                <span key={tech} className="px-3 py-1 bg-blue-50 text-blue-600 text-sm rounded-full">
                                                    {tech}
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // Contact Component
        function Contact() {
            const [formData, setFormData] = useState({ name: '', email: '', subject: '', message: '' });
            const [status, setStatus] = useState('');

            const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });

            const handleSubmit = (e) => {
                e.preventDefault();
                setStatus('sending');
                setTimeout(() => {
                    setStatus('success');
                    setFormData({ name: '', email: '', subject: '', message: '' });
                    setTimeout(() => setStatus(''), 3000);
                }, 1000);
            };

            return (
                <div className="min-h-screen bg-gray-50 py-16 px-4 pt-20">
                    <div className="max-w-7xl mx-auto">
                        <h1 className="text-4xl font-bold text-center text-gray-900 mb-4">Get In Touch</h1>
                        <p className="text-center text-gray-600 mb-12 max-w-2xl mx-auto">
                            Have a project in mind? Feel free to reach out!
                        </p>

                        <div className="grid md:grid-cols-2 gap-12">
                            <div className="bg-white p-8 rounded-xl shadow-md">
                                <h2 className="text-2xl font-semibold text-gray-900 mb-6">Contact Information</h2>
                                <div className="space-y-6">
                                    <div className="flex items-start gap-4">
                                        <div className="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center flex-shrink-0">
                                            <svg className="w-6 h-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                            </svg>
                                        </div>
                                        <div>
                                            <h3 className="font-semibold text-gray-900">Email</h3>
                                            <p className="text-gray-600">hello@example.com</p>
                                        </div>
                                    </div>
                                    <div className="flex items-start gap-4">
                                        <div className="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center flex-shrink-0">
                                            <svg className="w-6 h-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                                            </svg>
                                        </div>
                                        <div>
                                            <h3 className="font-semibold text-gray-900">Location</h3>
                                            <p className="text-gray-600">Lagos, Nigeria</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white p-8 rounded-xl shadow-md">
                                <h2 className="text-2xl font-semibold text-gray-900 mb-6">Send a Message</h2>
                                <form onSubmit={handleSubmit} className="space-y-6">
                                    <div className="grid md:grid-cols-2 gap-6">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">Name</label>
                                            <input type="text" name="name" value={formData.name} onChange={handleChange} required
                                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">Email</label>
                                            <input type="email" name="email" value={formData.email} onChange={handleChange} required
                                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">Subject</label>
                                        <input type="text" name="subject" value={formData.subject} onChange={handleChange} required
                                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">Message</label>
                                        <textarea name="message" value={formData.message} onChange={handleChange} required rows="5"
                                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
                                    </div>
                                    <button type="submit" disabled={status === 'sending'}
                                        className="w-full px-6 py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-colors disabled:bg-blue-400">
                                        {status === 'sending' ? 'Sending...' : 'Send Message'}
                                    </button>
                                    {status === 'success' && (
                                        <div className="p-4 bg-green-50 text-green-700 rounded-lg">Message sent successfully!</div>
                                    )}
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Footer Component
        function Footer() {
            const currentYear = new Date().getFullYear();
            return (
                <footer className="bg-gray-900 text-white py-12 px-4">
                    <div className="max-w-7xl mx-auto">
                        <div className="grid md:grid-cols-3 gap-8">
                            <div>
                                <h3 className="text-2xl font-bold mb-4">SureProfile</h3>
                                <p className="text-gray-400">Building exceptional digital experiences.</p>
                            </div>
                            <div>
                                <h4 className="text-lg font-semibold mb-4">Quick Links</h4>
                                <ul className="space-y-2">
                                    <li><a href="#" className="text-gray-400 hover:text-white transition-colors">Home</a></li>
                                    <li><a href="#" className="text-gray-400 hover:text-white transition-colors">About</a></li>
                                    <li><a href="#" className="text-gray-400 hover:text-white transition-colors">Projects</a></li>
                                    <li><a href="#" className="text-gray-400 hover:text-white transition-colors">Contact</a></li>
                                </ul>
                            </div>
                            <div>
                                <h4 className="text-lg font-semibold mb-4">Connect</h4>
                                <div className="flex gap-4">
                                    <a href="#" className="w-10 h-10 bg-gray-800 rounded-lg flex items-center justify-center hover:bg-blue-600 transition-colors">
                                        <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                                    </a>
                                    <a href="#" className="w-10 h-10 bg-gray-800 rounded-lg flex items-center justify-center hover:bg-blue-600 transition-colors">
                                        <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                                    </a>
                                </div>
                            </div>
                        </div>
                        <div className="border-t border-gray-800 mt-8 pt-8 text-center text-gray-400">
                            <p>© {currentYear} SureProfile. All rights reserved.</p>
                        </div>
                    </div>
                </footer>
            );
        }

        // Main App Component
        function App() {
            const [currentPage, setCurrentPage] = useState('home');

            const renderPage = () => {
                switch (currentPage) {
                    case 'home': return <Home />;
                    case 'about': return <About />;
                    case 'projects': return <Projects />;
                    case 'contact': return <Contact />;
                    default: return <Home />;
                }
            };

            return (
                <div className="min-h-screen bg-gray-50">
                    <Navbar currentPage={currentPage} setCurrentPage={setCurrentPage} />
                    <main className="fade-in">{renderPage()}</main>
                    <Footer />
                </div>
            );
        }

        // Render the App
        const root = ReactDOM.createRoot(document.getElementById('react-root'));
        root.render(<App />);
    </script>
</body>
</html>
